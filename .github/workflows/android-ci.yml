name: Android CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gradle enforces committed dependency lock state and verification metadata.
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        # setup-gradle v4+ validates every Gradle Wrapper JAR in the repository.
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run debug unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 7

  lint:
    name: Android lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        # setup-gradle v4+ validates every Gradle Wrapper JAR in the repository.
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Android lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload Android lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
            app/build/reports/lint-results-debug.txt
          if-no-files-found: warn
          retention-days: 7

  build:
    name: Build APKs
    needs:
      - unit-tests
      - lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        # setup-gradle v4+ validates every Gradle Wrapper JAR in the repository.
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug and unsigned release APKs
        run: ./gradlew assembleDebug assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v7
        with:
          name: release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

      # Instrumentation tests require a connected Android device and remain a local/device check.
